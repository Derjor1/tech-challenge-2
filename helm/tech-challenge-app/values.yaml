replicaCount: 1

image:
  repository: 883627150323.dkr.ecr.us-east-1.amazonaws.com/tech-challenge-app
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 5001

containerPort: 5001

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 12
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 50